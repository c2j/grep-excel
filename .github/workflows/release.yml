name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            features: duckdb-bundled
            artifact_name: grep_excel-duckdb-x86_64-pc-windows-msvc
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            features: duckdb-bundled
            artifact_name: grep_excel-duckdb-x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.features }}

      - name: Build
        env:
          CARGO_BUILD_JOBS: "2"
          NUM_JOBS: "2"
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ${{ matrix.artifact_name }}.zip grep_excel.exe

      - name: Archive (Linux)
        if: runner.os == 'Linux'
        run: |
          cd target/${{ matrix.target }}/release
          chmod +x grep_excel
          zip ${{ matrix.artifact_name }}.zip grep_excel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}.zip

  build-win7:
    name: Build windows-x86_64 (Win7 compatible)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - name: Add rust-src component
        run: rustup component add rust-src --toolchain nightly

      - name: Download prebuilt DuckDB
        shell: pwsh
        run: |
          $duckdb = "v1.5.1"
          $url = "https://github.com/duckdb/duckdb/releases/download/$duckdb/libduckdb-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile duckdb.zip
          Expand-Archive -Path duckdb.zip -DestinationPath duckdb-lib
          "DUCKDB_LIB_DIR=$pwd\duckdb-lib" >> $env:GITHUB_ENV

      - name: Build
        run: cargo +nightly build --release --no-default-features --features engine-duckdb --target x86_64-win7-windows-msvc -Zbuild-std

      - name: Package
        shell: pwsh
        run: |
          Copy-Item "duckdb-lib/duckdb.dll" "target/x86_64-win7-windows-msvc/release/"
          Compress-Archive `
            -Path "target/x86_64-win7-windows-msvc/release/grep_excel.exe","target/x86_64-win7-windows-msvc/release/duckdb.dll" `
            -DestinationPath "grep_excel-duckdb-x86_64-win7-windows-msvc.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grep_excel-duckdb-x86_64-win7-windows-msvc
          path: grep_excel-duckdb-x86_64-win7-windows-msvc.zip

  release:
    needs: [build, build-win7]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
