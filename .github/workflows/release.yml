name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            features: gui,engine-duckdb,mcp-server
            artifact_name: grep_excel-duckdb-x86_64-pc-windows-msvc
            prebuilt_duckdb: true
            build_desktop: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            features: gui,duckdb-bundled,mcp-server
            artifact_name: grep_excel-duckdb-x86_64-unknown-linux-gnu
            zigbuild: true
            build_desktop: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            features: gui,duckdb-bundled,mcp-server
            artifact_name: grep_excel-duckdb-aarch64-unknown-linux-gnu
            zigbuild: true
            build_desktop: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig (Linux)
        if: matrix.zigbuild
        uses: mlugg/setup-zig@v1
        with:
          version: "0.13.0"

      - name: Install cargo-zigbuild
        if: matrix.zigbuild
        run: cargo install cargo-zigbuild

      - name: Install Linux GUI dev libraries (for egui)
        if: matrix.zigbuild
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libx11-dev libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-x11-dev

      - name: Install Linux Tauri system dependencies
        if: matrix.build_desktop && runner.os == 'Linux'
        run: |
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.0-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Setup Node.js (for Tauri frontend)
        if: matrix.build_desktop
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Tauri frontend
        if: matrix.build_desktop
        working-directory: Desktop
        run: |
          npm ci
          npm run build

      - name: Download prebuilt DuckDB (Windows)
        if: matrix.prebuilt_duckdb
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/duckdb/duckdb/releases/download/v1.5.1/libduckdb-windows-amd64.zip" -OutFile duckdb.zip
          Expand-Archive -Path duckdb.zip -DestinationPath duckdb-lib
          "DUCKDB_LIB_DIR=$pwd\duckdb-lib" >> $env:GITHUB_ENV

      - name: Build CLI (Linux)
        if: matrix.zigbuild
        run: cargo zigbuild --release -p grep-excel --no-default-features --features ${{ matrix.features }} --target ${{ matrix.target }}.2.31

      - name: Build CLI (Windows)
        if: ${{ !matrix.zigbuild }}
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}

      - name: Build desktop app (Linux x86_64)
        if: matrix.build_desktop && runner.os == 'Linux'
        run: cargo build --release --target ${{ matrix.target }} -p grep-excel-desktop --features duckdb-bundled,custom-protocol

      - name: Build desktop app (Windows)
        if: matrix.build_desktop && runner.os == 'Windows'
        run: cargo build --release --target ${{ matrix.target }} -p grep-excel-desktop --features custom-protocol

      - name: Strip (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          strip --strip-unneeded target/${{ matrix.target }}/release/grep_excel
          strip --strip-unneeded target/${{ matrix.target }}/release/spike
          strip --strip-unneeded target/${{ matrix.target }}/release/grep-excel-desktop || true

      - name: Strip (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          strip --strip-unneeded target/${{ matrix.target }}/release/grep_excel
          strip --strip-unneeded target/${{ matrix.target }}/release/spike
          strip --strip-unneeded target/${{ matrix.target }}/release/grep-excel-desktop || true

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          find ../.. -name duckdb.dll -path "*/duckdb-download/*" -exec cp {} . \; 2>/dev/null || true
          cp ../../../duckdb-lib/duckdb.dll . 2>/dev/null || true
          if [ -f "grep-excel-desktop.exe" ]; then
            7z a ${{ matrix.artifact_name }}-v${{ steps.version.outputs.version }}.zip grep_excel.exe spike.exe duckdb.dll grep-excel-desktop.exe
          else
            7z a ${{ matrix.artifact_name }}-v${{ steps.version.outputs.version }}.zip grep_excel.exe spike.exe duckdb.dll
          fi

      - name: Archive (Linux)
        if: runner.os == 'Linux'
        run: |
          cd target/${{ matrix.target }}/release
          chmod +x grep_excel spike
          if [ -f "grep-excel-desktop" ]; then
            chmod +x grep-excel-desktop
            zip ${{ matrix.artifact_name }}-v${{ steps.version.outputs.version }}.zip grep_excel spike grep-excel-desktop
          else
            zip ${{ matrix.artifact_name }}-v${{ steps.version.outputs.version }}.zip grep_excel spike
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-v${{ steps.version.outputs.version }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}-v${{ steps.version.outputs.version }}.zip

  build-win7:
    name: Build windows-x86_64 (Win7 compatible)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@nightly

      - name: Add rust-src component
        run: rustup component add rust-src --toolchain nightly

      - name: Download prebuilt DuckDB
        shell: pwsh
        run: |
          $duckdb = "v1.5.1"
          $url = "https://github.com/duckdb/duckdb/releases/download/$duckdb/libduckdb-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile duckdb.zip
          Expand-Archive -Path duckdb.zip -DestinationPath duckdb-lib
          "DUCKDB_LIB_DIR=$pwd\duckdb-lib" >> $env:GITHUB_ENV

      - name: Build
        run: cargo +nightly build --release -p grep-excel --no-default-features --features gui,engine-duckdb,mcp-server --target x86_64-win7-windows-msvc -Zbuild-std

      - name: Package
        shell: pwsh
        run: |
          Copy-Item "duckdb-lib/duckdb.dll" "target/x86_64-win7-windows-msvc/release/"
          $version = "${{ steps.version.outputs.version }}"
          Compress-Archive `
            -Path "target/x86_64-win7-windows-msvc/release/grep_excel.exe","target/x86_64-win7-windows-msvc/release/spike.exe","target/x86_64-win7-windows-msvc/release/duckdb.dll" `
            -DestinationPath "grep_excel-duckdb-x86_64-win7-windows-msvc-v${version}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grep_excel-duckdb-x86_64-win7-windows-msvc-v${{ steps.version.outputs.version }}
          path: grep_excel-duckdb-x86_64-win7-windows-msvc-v${{ steps.version.outputs.version }}.zip

  release:
    needs: [build, build-win7]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
