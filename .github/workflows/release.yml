name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            features: engine-duckdb
            artifact_name: grep_excel-duckdb-x86_64-pc-windows-msvc
            prebuilt_duckdb: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            features: duckdb-bundled
            artifact_name: grep_excel-duckdb-x86_64-unknown-linux-gnu
            zigbuild: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            features: duckdb-bundled
            artifact_name: grep_excel-duckdb-aarch64-unknown-linux-gnu
            zigbuild: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig (Linux)
        if: matrix.zigbuild
        uses: mlugg/setup-zig@v1
        with:
          version: "0.13.0"

      - name: Install cargo-zigbuild
        if: matrix.zigbuild
        run: cargo install cargo-zigbuild

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.features }}

      - name: Download prebuilt DuckDB (Windows)
        if: matrix.prebuilt_duckdb
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/duckdb/duckdb/releases/download/v1.5.1/libduckdb-windows-amd64.zip" -OutFile duckdb.zip
          Expand-Archive -Path duckdb.zip -DestinationPath duckdb-lib
          "DUCKDB_LIB_DIR=$pwd\duckdb-lib" >> $env:GITHUB_ENV

      - name: Build (Linux)
        if: matrix.zigbuild
        run: cargo zigbuild --release --no-default-features --features ${{ matrix.features }} --target ${{ matrix.target }}.2.31

      - name: Build (Windows)
        if: ${{ !matrix.zigbuild }}
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}

      - name: Strip (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: strip --strip-unneeded target/${{ matrix.target }}/release/grep_excel

      - name: Strip (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y binutils-aarch64-linux-gnu
          aarch64-linux-gnu-strip --strip-unneeded target/${{ matrix.target }}/release/grep_excel

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          find ../.. -name duckdb.dll -path "*/duckdb-download/*" -exec cp {} . \; 2>/dev/null || true
          cp ../../../duckdb-lib/duckdb.dll . 2>/dev/null || true
          7z a ${{ matrix.artifact_name }}-v${{ steps.version.outputs.version }}.zip grep_excel.exe duckdb.dll

      - name: Archive (Linux)
        if: runner.os == 'Linux'
        run: |
          cd target/${{ matrix.target }}/release
          chmod +x grep_excel
          zip ${{ matrix.artifact_name }}-v${{ steps.version.outputs.version }}.zip grep_excel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-v${{ steps.version.outputs.version }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}-v${{ steps.version.outputs.version }}.zip

  build-win7:
    name: Build windows-x86_64 (Win7 compatible)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@nightly

      - name: Add rust-src component
        run: rustup component add rust-src --toolchain nightly

      - name: Download prebuilt DuckDB
        shell: pwsh
        run: |
          $duckdb = "v1.5.1"
          $url = "https://github.com/duckdb/duckdb/releases/download/$duckdb/libduckdb-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile duckdb.zip
          Expand-Archive -Path duckdb.zip -DestinationPath duckdb-lib
          "DUCKDB_LIB_DIR=$pwd\duckdb-lib" >> $env:GITHUB_ENV

      - name: Build
        run: cargo +nightly build --release --no-default-features --features engine-duckdb --target x86_64-win7-windows-msvc -Zbuild-std

      - name: Package
        shell: pwsh
        run: |
          Copy-Item "duckdb-lib/duckdb.dll" "target/x86_64-win7-windows-msvc/release/"
          $version = "${{ steps.version.outputs.version }}"
          Compress-Archive `
            -Path "target/x86_64-win7-windows-msvc/release/grep_excel.exe","target/x86_64-win7-windows-msvc/release/duckdb.dll" `
            -DestinationPath "grep_excel-duckdb-x86_64-win7-windows-msvc-v${version}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grep_excel-duckdb-x86_64-win7-windows-msvc-v${{ steps.version.outputs.version }}
          path: grep_excel-duckdb-x86_64-win7-windows-msvc-v${{ steps.version.outputs.version }}.zip

  release:
    needs: [build, build-win7]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
